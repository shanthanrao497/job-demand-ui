<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Demand Estimation - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
}

.login-box{
width:430px;
padding:40px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(20px);
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.4);
color:white;
}

.login-box h1{
text-align:center;
margin-bottom:10px;
font-size:32px;
color:#38bdf8;
}

.login-box h3{
text-align:center;
margin-bottom:30px;
font-weight:400;
color:#e5e7eb;
}

.login-box input{
width:100%;
padding:15px;
margin-bottom:18px;
border:none;
outline:none;
border-radius:10px;
font-size:16px;
}

.login-box button{
width:100%;
padding:15px;
border:none;
border-radius:30px;
background:#2563eb;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
}

.login-box button:hover{
background:#1d4ed8;
transform:translateY(-2px);
}

.register-link{
text-align:center;
margin-top:20px;
}

.register-link a{
color:#38bdf8;
text-decoration:none;
font-weight:bold;
}

.demo-note{
margin-top:25px;
padding:18px;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.15);
border-radius:15px;
text-align:center;
}

.demo-note h2{
font-size:20px;
margin-bottom:12px;
color:#22c55e;
}

.demo-note p{
margin:6px 0;
font-size:15px;
color:white;
}

.note{
margin-top:10px;
font-size:13px;
color:#d1d5db;
line-height:1.5;
}

</style>

</head>

<body>

<div class="login-box">

<h1>Job Demand Estimation</h1>

<h3>Using Text Embeddings</h3>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<button onclick="window.location.href='dashboard.html'">

Login

</button>

<div class="register-link">

Don't have an account?

<a href="register.html">Register</a>

</div>

<div class="demo-note">

<h2>Demo Login Credentials</h2>

<p><strong>Username:</strong> admin</p>

<p><strong>Password:</strong> admin123</p>

<p class="note">

This is a demonstration project for academic, interview, and portfolio purposes.

Use the above credentials to access the dashboard.

</p>

</div>

</div>

</body>
</html>
