<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link rel="stylesheet" href="css/style.css">

<style>
.login-box{
    width:380px;
    margin:80px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,.1);
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

h2{
    text-align:center;
    margin-bottom:20px;
}
</style>

</head>

<body>

<div class="login-box">

<h2>User Login</h2>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<button onclick="window.location='dashboard.html'">
Login
</button>

<br><br>

<center>
Don't have an account?
<a href="register.html">Register</a>
</center>

</div>

</body>
</html>
